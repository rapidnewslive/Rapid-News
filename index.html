<!DOCTYPE html>
<html>
<head>
<title>Rapid News</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(120deg, #2196f3, #e3f2fd);
}

/* NAVBAR */
.navbar {
  background: linear-gradient(to right, #000000, #434343);
  padding: 15px;
  text-align: center;
}

.navbar a {
  color: white;
  margin: 15px;
  text-decoration: none;
  font-size: 18px;
  font-weight: bold;
}

/* BREAKING NEWS BAR */
.ticker {
  background: red;
  color: white;
  padding: 10px;
  font-weight: bold;
  overflow: hidden;
}

.ticker span {
  display: inline-block;
  white-space: nowrap;
  animation: scroll 12s linear infinite;
}

@keyframes scroll {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

/* MAIN BOX */
.container {
  background: white;
  padding: 40px;
  margin: 80px auto;
  width: 85%;
  max-width: 900px;
  border-radius: 15px;
  box-shadow: 0px 8px 30px rgba(0,0,0,0.3);
  text-align: center;
}

/* LOGO */
.logo {
  display: block;
  margin: 0 auto 20px auto;
  width: 350px;
  filter: drop-shadow(0px 5px 15px rgba(0,0,0,0.7));
}

h1 {
  font-size: 50px;
  color: #d32f2f;
}

p {
  font-size: 20px;
  color: #444;
}

.badge {
  margin-top: 20px;
  padding: 10px 20px;
  background: orange;
  color: white;
  border-radius: 20px;
}

/* FOOTER */
.footer {
  margin-top: 50px;
  padding: 15px;
  background: #000;
  color: white;
  text-align: center;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
  <a href="privacy.html">Privacy</a>
</div>

<!-- BREAKING NEWS -->
<div class="ticker">
  <span>🔴 BREAKING NEWS: Rapid News App Launching Soon | Latest Updates Coming | Stay Tuned 🔥</span>
</div>

<!-- CONTENT -->
<div class="container">

  <img src="logo.png" class="logo">

  <h1>Rapid News</h1>
  <p>Fast • Reliable • Breaking Updates Anytime</p>

  <div class="badge">🚀 Coming Soon</div>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Rapid News
</div>

</body>
</html>
