<!DOCTYPE html>
<html>
<head>
<title>Rapid News</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(120deg, #2196f3, #e3f2fd);
}

/* NAVBAR */
.navbar {
  background: linear-gradient(to right, #000000, #434343);
  padding: 15px;
  text-align: center;
}

.navbar a {
  color: white;
  margin: 20px;
  text-decoration: none;
  font-size: 18px;
  font-weight: bold;
}

/* BREAKING NEWS */
.ticker {
  background: red;
  color: white;
  padding: 10px;
  font-weight: bold;
  overflow: hidden;
}

.ticker span {
  display: inline-block;
  white-space: nowrap;
  animation: scroll 12s linear infinite;
}

@keyframes scroll {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

/* MAIN BOX */
.container {
  background: white;
  padding: 40px;
  margin: 60px auto;
  width: 85%;
  max-width: 900px;
  border-radius: 15px;
  box-shadow: 0px 8px 30px rgba(0,0,0,0.3);
  text-align: center;
}

/* LOGO */
.logo {
  display: block;
  margin: 0 auto 20px auto;
  width: 350px;
}

/* TEXT */
h1 {
  font-size: 45px;
  color: #d32f2f;
}

p {
  font-size: 18px;
  color: #444;
}

/* BUTTON */
.btn {
  display:inline-block;
  padding:12px 25px;
  margin-top:15px;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}

.download { background:#2196F3; }
.app { background:#4CAF50; }

/* NEWS */
#news {
  margin-top:20px;
  font-size:20px;
  font-weight:bold;
  color:#333;
}

/* FOOTER */
.footer {
  margin-top: 50px;
  padding: 15px;
  background: #000;
  color: white;
  text-align: center;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
  <a href="privacy.html">Privacy</a>
</div>

<!-- BREAKING NEWS -->
<div class="ticker">
  <span>🔴 BREAKING NEWS: Rapid News App Launching Soon | Latest Updates Coming | Stay Tuned 🔥</span>
</div>

<!-- MAIN -->
<div class="container">

<img src="logo.png" class="logo">

<button onclick="changeLang()" style="padding:8px 15px; border:none; background:#333; color:white; border-radius:5px;">
🌐 Change Language
</button>

<h1 id="title">Rapid News</h1>

<p id="desc">Fast • Reliable • Breaking Updates Anytime</p>

<h2>Latest News</h2>
<div id="news">Loading news...</div>

<a href="#" class="btn app">📲 Download App</a>
<br>
<a href="app.apk" download class="btn download">⬇️ Download APK</a>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Rapid News
</div>

<script>
/* News Auto Change */
const newsData = [
"Breaking: AP Politics Latest Updates",
"Big News: New Government Decisions Released",
"Sports: India Wins Thrilling Match",
"Technology: New Mobile Launch in India",
"Local: Vijayawada City Updates"
];

let i = 0;
setInterval(() => {
document.getElementById("news").innerText = newsData[i];
i = (i + 1) % newsData.length;
}, 2000);

/* Language Toggle */
let lang = "en";

function changeLang() {
if(lang === "en") {
document.getElementById("title").innerText = "రాపిడ్ న్యూస్";
document.getElementById("desc").innerText = "వేగంగా, నమ్మకమైన వార్తలు మీకు అందిస్తాం";
lang = "te";
} else {
document.getElementById("title").innerText = "Rapid News";
document.getElementById("desc").innerText = "Fast • Reliable • Breaking Updates Anytime";
lang = "en";
}
}
</script>

</body>
</html>
