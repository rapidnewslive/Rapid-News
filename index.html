<!DOCTYPE html>
<html>
<head>
<title>Rapid News</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(120deg, #2196f3, #e3f2fd);
}

/* NAVBAR */
.navbar {
  background: linear-gradient(to right, #000000, #434343);
  padding: 15px;
  text-align: center;
}

.navbar a {
  color: white;
  margin: 20px;
  text-decoration: none;
  font-size: 18px;
  font-weight: bold;
}

/* TICKER */
.ticker {
  background: red;
  color: white;
  padding: 10px;
  font-weight: bold;
}

/* MAIN */
.container {
  background: white;
  padding: 40px;
  margin: 60px auto;
  width: 85%;
  max-width: 900px;
  border-radius: 15px;
  box-shadow: 0px 8px 30px rgba(0,0,0,0.3);
  text-align: center;
}

/* LOGO */
.logo {
  display: block;
  margin: 0 auto 20px auto;
  width: 300px;
}

/* TEXT */
h1 { color:#d32f2f; }
p { font-size:18px; }

/* NEWS BOX */
.news-box {
  margin-top:20px;
  padding:20px;
  border:1px solid #ddd;
  border-radius:10px;
}

/* BUTTON */
.btn {
  display:inline-block;
  padding:12px 25px;
  margin-top:15px;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
  background:#2196F3;
}

/* FOOTER */
.footer {
  margin-top: 50px;
  padding: 15px;
  background: #000;
  color: white;
  text-align: center;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
  <a href="privacy.html">Privacy</a>
</div>

<!-- BREAKING -->
<div class="ticker">
🔴 BREAKING NEWS: Rapid News App Launching Soon
</div>

<!-- MAIN -->
<div class="container">

<img src="logo.png" class="logo">

<button onclick="changeLang()">🌐 Change Language</button>

<h1 id="title">Rapid News</h1>
<p id="desc">Fast • Reliable • Breaking Updates Anytime</p>

<h2>Latest News</h2>
<div id="newsBox" class="news-box">No news added</div>

<a href="app.apk" class="btn" download>⬇️ Download APK</a>

</div>

<!-- FOOTER -->
<div class="footer">
© 2026 Rapid News
</div>

<script>

/* LANGUAGE */
let lang = "en";

function changeLang() {
if(lang === "en") {
document.getElementById("title").innerText = "రాపిడ్ న్యూస్";
document.getElementById("desc").innerText = "తాజా వార్తలు వెంటనే అందిస్తాము";
lang = "te";
} else {
document.getElementById("title").innerText = "Rapid News";
document.getElementById("desc").innerText = "Fast • Reliable • Breaking Updates Anytime";
lang = "en";
}
}

/* ADMIN NEWS LOAD */
let data = JSON.parse(localStorage.getItem("latestNews"));

if(data){
document.getElementById("newsBox").innerHTML = `
<h3>${data.title}</h3>
<p>${data.summary}</p>
<img src="${data.media}" width="300">
`;
}

</script>

</body>
</html>
