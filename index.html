<!DOCTYPE html>
<html>
<head>
<title>Rapid News</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
}

/* NAVBAR */
.navbar {
  height: 100px;
  padding: 0 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(to right, #000, #1a1a1a);
}

.logo-box img {
  height: 180px;
  margin-top: 10px;
}

/* MENU BUTTONS */
.menu a {
  color: white;
  text-decoration: none;
  margin: 0 10px;
  padding: 10px 18px;
  border-radius: 25px;
  font-weight: bold;
  background: linear-gradient(45deg, #ff9800, #ff5722);
  transition: 0.3s;
}

.menu a:hover {
  background: linear-gradient(45deg, #ffd700, #ff9800);
}

/* BREAKING FIX */
.breaking {
  background: linear-gradient(90deg, red, darkred);
  color: white;
  padding: 12px 0;
  overflow: hidden;
  white-space: nowrap;
}

.breaking span {
  display: inline-block;
  padding-left: 100%;
  animation: scroll 12s linear infinite;
}

@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* CONTENT */
.wrapper {
  max-width: 1200px;
  margin: auto;
}

.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

.left { width: 70%; }
.right { width: 30%; }

.featured {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  margin-bottom: 20px;
}

.featured img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.featured-content {
  padding: 20px;
}

.news-card {
  display: flex;
  background: white;
  border-radius: 10px;
  margin-bottom: 15px;
}

.news-card img {
  width: 150px;
  height: 100px;
  object-fit: cover;
}

.news-content {
  padding: 10px;
}

.sidebar {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

</style>
</head>

<body>

<div class="navbar">
  <div class="logo-box">
    <img src="logo.png">
  </div>

  <div class="menu">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="privacy.html">Privacy</a>
  </div>
</div>

<div class="breaking">
  <span>🔥 Breaking: Latest Telugu News Updates Instantly 🚀</span>
</div>

<div class="wrapper">
<div class="container">

<div class="left">

<div class="featured">
  <img src="https://images.unsplash.com/photo-1504711434969-e33886168f5c">
  <div class="featured-content">
    <h2 style="color:red;">Top Breaking News</h2>
    <p>ఇది ప్రధాన వార్త. ఇది highlight అవుతుంది.</p>
  </div>
</div>

<div class="news-card">
  <img src="https://images.unsplash.com/photo-1495020689067-958852a7765e">
  <div class="news-content">
    <h3>ఈ తీర్పు ఎన్నికల వరకు: రాజదీప్</h3>
    <p>కేంద్రం పాలనపై విమర్శలు...</p>
  </div>
</div>

</div>

<div class="right">
  <div class="sidebar">
    <h3>Featured News</h3>
    <p>More updates coming soon...</p>
  </div>
</div>

</div>
</div>

</body>
</html>
