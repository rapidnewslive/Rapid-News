<!DOCTYPE html>
<html>
<head>
<title>Rapid News</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
}

/* NAVBAR */
.navbar {
  background: linear-gradient(to right, #000000, #1a1a1a);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 50px;
}

/* LOGO BIG FIX */
.logo-box img {
  height: 110px; /* 🔥 BIG */
}

/* MENU */
.menu a {
  color: white;
  text-decoration: none;
  margin: 0 15px;
  font-weight: bold;
}

/* BREAKING */
.breaking {
  background: red;
  color: white;
  padding: 10px;
  text-align: center;
  font-weight: bold;
}

/* MAIN CENTER FIX */
.wrapper {
  max-width: 1200px;
  margin: auto;
}

/* CONTENT */
.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

/* LEFT */
.left {
  width: 70%;
}

/* RIGHT */
.right {
  width: 30%;
}

/* FEATURED */
.featured {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 20px;
}

.featured img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.featured-content {
  padding: 20px;
}

.featured h2 {
  color: red;
}

/* NEWS */
.news-card {
  display: flex;
  background: white;
  margin-bottom: 15px;
  border-radius: 10px;
  overflow: hidden;
}

.news-card img {
  width: 160px;
  height: 110px;
  object-fit: cover;
}

.news-content {
  padding: 10px;
}

/* SIDEBAR */
.sidebar {
  background: white;
  padding: 15px;
  border-radius: 10px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo-box">
    <img src="logo.png">
  </div>

  <div class="menu">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
    <a href="#">Privacy</a>
  </div>
</div>

<!-- BREAKING -->
<div class="breaking">
🔥 Breaking: Latest Telugu News Updates Instantly
</div>

<!-- WRAPPER (CENTER FIX) -->
<div class="wrapper">

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <div class="featured">
      <img src="https://images.unsplash.com/photo-1504711434969-e33886168f5c">
      <div class="featured-content">
        <h2>Top Breaking News</h2>
        <p>ఇది ప్రధాన వార్త. ఇది highlight అవుతుంది.</p>
      </div>
    </div>

    <div class="news-card">
      <img src="https://images.unsplash.com/photo-1495020689067-958852a7765e">
      <div class="news-content">
        <h3>ఈ తీర్పు ఎన్నికల వరకు: రాజదీప్</h3>
        <p>కేంద్రం పాలనపై విమర్శలు...</p>
      </div>
    </div>

    <div class="news-card">
      <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
      <div class="news-content">
        <h3>RCB vs SRH.. ప్లేయింగ్-11 ఇదే!</h3>
        <p>క్రికెట్ అభిమానులకు...</p>
      </div>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="sidebar">
      <h3>Featured News</h3>
      <p>More updates coming soon...</p>
    </div>
  </div>

</div>

</div>

</body>
</html>
