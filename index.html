<!DOCTYPE html>
<html>
<head>
<title>Rapid News</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f1f1f1;
}

/* Navbar */
.navbar {
  background: #000;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
}

.logo {
  height: 40px;
}

.menu a {
  color: white;
  margin: 15px;
  text-decoration: none;
  font-weight: bold;
}

.menu a:hover {
  color: #ff9800;
}

/* Breaking */
.breaking {
  background: red;
  color: white;
  padding: 8px;
  font-size: 14px;
  text-align: center;
}

/* Layout */
.main {
  display: flex;
  max-width: 1100px;
  margin: auto;
  padding: 15px;
}

.left {
  flex: 3;
}

.right {
  flex: 1;
  margin-left: 15px;
}

/* Featured */
.featured {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
}

.featured img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.featured-content {
  padding: 15px;
}

.featured-title {
  font-size: 22px;
  font-weight: bold;
}

/* News List */
.news-card {
  display: flex;
  background: white;
  margin-bottom: 15px;
  border-radius: 10px;
  overflow: hidden;
}

.news-img {
  width: 120px;
  height: 100px;
  object-fit: cover;
}

.news-content {
  padding: 10px;
}

.news-title {
  font-size: 16px;
  font-weight: bold;
}

.news-summary {
  font-size: 13px;
  color: #555;
}

/* Side */
.side-box {
  background: white;
  padding: 15px;
  border-radius: 10px;
}

.side-title {
  font-weight: bold;
  margin-bottom: 10px;
}

/* Mobile */
@media(max-width:768px){
  .main {
    flex-direction: column;
  }
  .right {
    margin-left: 0;
    margin-top: 20px;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <img src="logo.png" class="logo">
  <div class="menu">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="privacy.html">Privacy</a>
  </div>
</div>

<!-- BREAKING -->
<div class="breaking">
🔥 Breaking: Latest Telugu News Updates Instantly
</div>

<div class="main">

<!-- LEFT -->
<div class="left">

<!-- Featured -->
<div class="featured">
<img src="https://via.placeholder.com/600x300">
<div class="featured-content">
<div class="featured-title">Top Breaking News</div>
<p>ఇది ప్రధాన వార్త. ఇది highlight అవుతుంది.</p>
</div>
</div>

<!-- News List -->
<div id="news"></div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="side-box">
<div class="side-title">Featured News</div>
<p>More updates coming soon...</p>
</div>

</div>

</div>

<script>

let newsData = [
{
title: "ఈ తీరుపై ఎన్నికల వరకు: రాజ్‌దీప్",
summary: "కేంద్రం పాత్రపై విమర్శలు వెల్లువెత్తుతున్నాయి.",
image: "https://via.placeholder.com/150"
},
{
title: "RCB vs SRH.. ప్లేయింగ్-11 ఇదే!",
summary: "క్రికెట్ అభిమానులకు మంచి మ్యాచ్.",
image: "https://via.placeholder.com/150"
}
];

let output = "";

newsData.forEach(data => {
output += `
<div class="news-card">
<img src="${data.image}" class="news-img">
<div class="news-content">
<div class="news-title">${data.title}</div>
<div class="news-summary">${data.summary}</div>
</div>
</div>
`;
});

document.getElementById("news").innerHTML = output;

</script>

</body>
</html>
